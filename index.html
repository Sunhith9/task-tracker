<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>₹ Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f4f0;--card:#fff;--border:#e2ddd6;--text:#1a1814;--muted:#6b6560;
  --orange:#d4622a;--blue:#2a7dd4;--green:#2a9d5c;--red:#d42a2a;--purple:#7a2ad4;--gold:#d4a02a;
  --input-bg:#f0ede8;--radius:14px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;font-size:14px;overflow-x:hidden}
input,select,textarea{font-family:inherit;font-size:13px;background:var(--input-bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 13px;color:var(--text);width:100%;outline:none;transition:border-color .15s,background .15s;appearance:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--orange);background:#fff}
label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:5px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--input-bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Layout */
#app{min-height:100vh;display:flex;flex-direction:column}
#header{background:var(--card);border-bottom:1.5px solid var(--border);position:sticky;top:0;z-index:100;padding:0 16px;padding-top:env(safe-area-inset-top)}
.header-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-size:20px;font-weight:800;letter-spacing:-.03em}
.logo span{color:var(--orange)}
.tabs-bar{display:flex;gap:2px}
.tab-btn{padding:7px 14px;border-radius:var(--radius-sm);font-weight:600;font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:all .15s;background:transparent;color:var(--muted);white-space:nowrap}
.tab-btn.active{background:var(--orange);color:#fff}
.tab-btn:hover:not(.active){background:var(--input-bg)}
#content{flex:1;max-width:1180px;margin:0 auto;width:100%;padding:16px}
#bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1.5px solid var(--border);padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom));z-index:100;justify-content:space-around}
.bnav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--muted);border:none;background:none;cursor:pointer;padding:4px 12px;border-radius:var(--radius-sm);transition:all .15s}
.bnav-btn.active{color:var(--orange)}
.bnav-btn .icon{font-size:20px;line-height:1}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.05)}
.stat-card{background:var(--card);border-radius:12px;padding:16px 18px;border:1.5px solid var(--border);border-top:3px solid var(--orange)}
.stat-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.stat-value{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--text)}
.stat-sub{margin-top:4px;font-size:11px;color:var(--muted)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;border-radius:var(--radius-sm);font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:all .15s;font-size:13px;padding:9px 16px;white-space:nowrap;justify-content:center}
.btn:disabled{opacity:.4;cursor:default}
.btn-primary{background:var(--orange);color:#fff}
.btn-primary:hover:not(:disabled){background:#c05520}
.btn-secondary{background:var(--input-bg);color:var(--muted);border:1.5px solid var(--border)}
.btn-secondary:hover:not(:disabled){background:var(--border)}
.btn-danger{background:#fde8e8;color:var(--red)}
.btn-danger:hover:not(:disabled){background:#fbd0d0}
.btn-success{background:#e0f5ea;color:var(--green)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover:not(:disabled){background:#228a4f}
.btn-sm{font-size:12px;padding:5px 11px}
.btn-full{width:100%}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.02em;white-space:nowrap}
.tag-high{background:#fde8e8;color:var(--red)}
.tag-medium{background:#fef3d8;color:var(--gold)}
.tag-low{background:#e0f5ea;color:var(--green)}
.tag-blue{background:#e0eef5;color:var(--blue)}
.tag-purple{background:#ede0f5;color:var(--purple)}
.tag-orange{background:#fdf0e0;color:var(--orange)}
.tag-gray{background:var(--input-bg);color:var(--muted)}

/* Checkbox */
.checkbox{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.checkbox.checked{border-color:var(--green);background:var(--green)}
.checkbox-sm{width:14px;height:14px;border-radius:3px}

/* Form grid */
.form-col{display:flex;flex-direction:column;gap:13px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px}
.form-actions .btn{flex:1}

/* Tab panels */
.tab-panel{display:none;animation:fadeIn .2s ease}
.tab-panel.active{display:block}

/* Dashboard */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:18px}
.chart-wrap{position:relative;height:200px}

/* Tasks two-col on desktop */
.two-col{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
.two-col .left-panel{position:sticky;top:72px}
.two-col .right-panel{display:flex;flex-direction:column;gap:12px}

/* Task card */
.task-card{border:1.5px solid var(--border);border-radius:10px;padding:13px;background:var(--card);transition:all .15s}
.task-card.done{background:#f5fbf7}
.task-card.overdue{background:#fdf5f5;border-color:#f5c0c0}
.task-card.selected{outline:2px solid var(--orange);border-color:var(--orange)}

/* Expense card */
.exp-card{border:1.5px solid var(--border);border-radius:10px;padding:13px;background:var(--card)}
.exp-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* Progress bar */
.progress-track{height:5px;background:var(--input-bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}

/* Filter bar */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-bar .search-wrap{position:relative;flex:1;min-width:130px}
.filter-bar .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.filter-bar input[type=text]{padding-left:30px}
.filter-bar select{width:auto;flex-shrink:0}

/* Month nav */
.month-nav{display:flex;align-items:center;gap:10px}
.nav-btn{width:32px;height:32px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex-shrink:0}
.nav-btn:disabled{opacity:.3;cursor:default}
.month-label{font-size:15px;font-weight:700;min-width:130px;text-align:center}

/* View toggle */
.view-toggle{display:flex;background:var(--input-bg);border-radius:var(--radius-sm);padding:3px;gap:2px}
.view-btn{padding:5px 13px;border-radius:6px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s;font-family:inherit}
.view-btn.active{background:var(--card);color:var(--text)}

/* Bulk bar */
.bulk-bar{padding:11px 14px;display:flex;align-items:center;gap:9px;background:#fdf0e0;border:1.5px solid var(--orange);border-radius:var(--radius);flex-wrap:wrap}

/* Toast */
#toast{position:fixed;bottom:80px;right:16px;background:#1a1814;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;animation:slideUp .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.2);pointer-events:none;display:none}
#toast.show{display:block}

/* Loading */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--muted);z-index:9999}

/* Mobile: bottom nav + single column */
@media(max-width:700px){
  .tabs-bar{display:none}
  #bottom-nav{display:flex}
  #content{padding:12px 12px 90px}
  .two-col{grid-template-columns:1fr}
  .two-col .left-panel{position:static}
  .charts-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .filter-bar{gap:6px}
  .filter-bar select{width:100%}
  .stat-value{font-size:18px}
}
@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr}
}

/* Section headers */
.section-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.empty-state{text-align:center;color:var(--muted);padding:40px 0;font-size:13px}
.mono{font-family:'DM Mono',monospace}
.divider{border:none;border-top:1.5px solid var(--border);margin:14px 0}
</style>
</head>
<body>
<div id="loading">Loading…</div>
<div id="app" style="display:none">
  <header id="header">
    <div class="header-inner">
      <div class="logo"><span>₹</span> Tracker</div>
      <div class="tabs-bar">
        <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
        <button class="tab-btn" onclick="switchTab('tasks')">Tasks</button>
        <button class="tab-btn" onclick="switchTab('expenses')">Expenses</button>
        <button class="tab-btn" onclick="switchTab('budget')">Budget</button>
      </div>
    </div>
  </header>

  <main id="content">
    <!-- DASHBOARD -->
    <div id="tab-dashboard" class="tab-panel active">
      <div class="stats-grid" id="dash-stats"></div>
      <div class="charts-grid">
        <div class="card" style="padding:18px">
          <div class="section-title">📈 6-Month Expense Trend</div>
          <div class="chart-wrap"><canvas id="chart-line"></canvas></div>
        </div>
        <div class="card" style="padding:18px">
          <div class="section-title">🎯 This Month by Category</div>
          <div class="chart-wrap"><canvas id="chart-pie"></canvas></div>
          <div id="pie-empty" class="empty-state" style="display:none;padding:20px 0">No data this month</div>
        </div>
      </div>
      <div class="card" style="padding:18px">
        <div class="section-title">📅 Today's Tasks</div>
        <div id="dash-today-tasks"><p class="empty-state">No tasks due today ✓</p></div>
      </div>
    </div>

    <!-- TASKS -->
    <div id="tab-tasks" class="tab-panel">
      <div class="two-col">
        <div class="left-panel">
          <div class="card" style="padding:20px">
            <div class="section-title" id="task-form-title">➕ New Task</div>
            <div class="form-col">
              <div><label>Title *</label><input type="text" id="t-title" placeholder="What needs to be done?"/></div>
              <div class="form-row">
                <div><label>Priority</label>
                  <select id="t-priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                  </select>
                </div>
                <div><label>Category</label>
                  <select id="t-category">
                    <option value="work">Work</option>
                    <option value="personal" selected>Personal</option>
                    <option value="shopping">Shopping</option>
                    <option value="bills">Bills</option>
                    <option value="food">Food</option>
                    <option value="health">Health</option>
                  </select>
                </div>
              </div>
              <div><label>Due Date</label><input type="date" id="t-duedate"/></div>
              <div>
                <label>Subtasks (<span id="subtask-count">0</span>)</label>
                <div style="display:flex;gap:6px;margin-bottom:6px">
                  <input type="text" id="t-subtask-input" placeholder="Add a subtask…" style="flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();addSubtask()}"/>
                  <button class="btn btn-secondary btn-sm" type="button" onclick="addSubtask()">Add</button>
                </div>
                <div id="subtask-list"></div>
              </div>
              <div><label>Link Expense (Optional)</label>
                <select id="t-linked-expense"><option value="">None</option></select>
              </div>
              <div class="form-actions">
                <button class="btn btn-primary" id="t-submit-btn" onclick="submitTask()">Add Task</button>
                <button class="btn btn-secondary" id="t-cancel-btn" onclick="cancelTaskEdit()" style="display:none">Cancel</button>
              </div>
            </div>
          </div>
        </div>

        <div class="right-panel">
          <div class="card" style="padding:12px">
            <div class="filter-bar">
              <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="t-search" placeholder="Search tasks…" oninput="renderTasks()"/>
              </div>
              <select id="t-filter-priority" onchange="renderTasks()" style="width:130px">
                <option value="all">All Priorities</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
              <select id="t-filter-status" onchange="renderTasks()" style="width:130px">
                <option value="all">All Status</option>
                <option value="pending">Pending</option>
                <option value="completed">Completed</option>
                <option value="overdue">Overdue</option>
              </select>
              <select id="t-sort" onchange="renderTasks()" style="width:130px">
                <option value="created">Newest First</option>
                <option value="dueDate">Due Date</option>
                <option value="priority">Priority</option>
                <option value="title">A–Z</option>
              </select>
            </div>
          </div>

          <div id="bulk-bar" class="bulk-bar" style="display:none">
            <span id="bulk-count" style="font-size:13px;font-weight:600;color:var(--orange)"></span>
            <button class="btn btn-success btn-sm" onclick="bulkComplete()">✓ Complete</button>
            <button class="btn btn-danger btn-sm" onclick="bulkDelete()">🗑 Delete</button>
            <button class="btn btn-secondary btn-sm" onclick="selectAll()">Select All</button>
            <button class="btn btn-secondary btn-sm" style="margin-left:auto" onclick="clearSelection()">Clear</button>
          </div>

          <div id="task-count" style="font-size:12px;color:var(--muted);padding-left:2px"></div>
          <div id="task-list" style="display:flex;flex-direction:column;gap:9px"></div>
        </div>
      </div>
    </div>

    <!-- EXPENSES -->
    <div id="tab-expenses" class="tab-panel">
      <div class="two-col">
        <div class="left-panel">
          <div class="card" style="padding:20px;margin-bottom:14px">
            <div class="section-title" id="exp-form-title">💸 Add Expense</div>
            <div class="form-col">
              <div><label>Amount (₹) *</label><input type="number" id="e-amount" min="0.01" step="0.01" placeholder="0.00"/></div>
              <div><label>Note</label><input type="text" id="e-note" placeholder="What was this for?"/></div>
              <div class="form-row">
                <div><label>Category</label>
                  <select id="e-category">
                    <option value="work">Work</option>
                    <option value="personal" selected>Personal</option>
                    <option value="shopping">Shopping</option>
                    <option value="bills">Bills</option>
                    <option value="food">Food</option>
                    <option value="health">Health</option>
                  </select>
                </div>
                <div><label>Date</label><input type="date" id="e-date"/></div>
              </div>
              <div><label>Link Task (Optional)</label>
                <select id="e-linked-task"><option value="">None</option></select>
              </div>
              <div class="form-actions">
                <button class="btn btn-primary" id="e-submit-btn" onclick="submitExpense()">Add Expense</button>
                <button class="btn btn-secondary" id="e-cancel-btn" onclick="cancelExpEdit()" style="display:none">Cancel</button>
              </div>
            </div>
          </div>

          <div class="card" style="padding:20px">
            <div class="section-title">💵 Add Income</div>
            <div class="form-col">
              <div><label>Amount (₹) *</label><input type="number" id="i-amount" min="0.01" step="0.01" placeholder="0.00"/></div>
              <div><label>Source</label>
                <select id="i-source">
                  <option value="salary" selected>Salary</option>
                  <option value="freelance">Freelance</option>
                  <option value="business">Business</option>
                  <option value="investment">Investment</option>
                  <option value="gift">Gift</option>
                  <option value="other">Other</option>
                </select>
              </div>
              <div class="form-row">
                <div><label>Date</label><input type="date" id="i-date"/></div>
                <div><label>Note</label><input type="text" id="i-note" placeholder="Optional"/></div>
              </div>
              <button class="btn btn-green btn-full" onclick="submitIncome()">Add Income</button>
            </div>
          </div>
        </div>

        <div class="right-panel">
          <div class="card" style="padding:14px">
            <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px">
              <div class="month-nav">
                <button class="nav-btn" onclick="prevMonth()">‹</button>
                <span class="month-label" id="exp-month-label"></span>
                <button class="nav-btn" id="next-month-btn" onclick="nextMonth()">›</button>
              </div>
              <div style="display:flex;gap:16px" id="exp-month-totals"></div>
            </div>
            <div id="cat-bars"></div>
          </div>

          <div class="card" style="padding:12px">
            <div class="filter-bar">
              <div class="view-toggle">
                <button class="view-btn active" id="vbtn-expenses" onclick="setViewMode('expenses')">Expenses</button>
                <button class="view-btn" id="vbtn-income" onclick="setViewMode('income')">Income</button>
              </div>
              <div id="exp-filters" style="display:contents">
                <div class="search-wrap" style="flex:1;min-width:120px">
                  <span class="search-icon">🔍</span>
                  <input type="text" id="e-search" placeholder="Search…" oninput="renderExpenses()" style="padding-left:28px"/>
                </div>
                <select id="e-filter-cat" onchange="renderExpenses()" style="width:130px">
                  <option value="all">All Categories</option>
                  <option value="work">Work</option>
                  <option value="personal">Personal</option>
                  <option value="shopping">Shopping</option>
                  <option value="bills">Bills</option>
                  <option value="food">Food</option>
                  <option value="health">Health</option>
                </select>
                <select id="e-sort" onchange="renderExpenses()" style="width:110px">
                  <option value="date">Date</option>
                  <option value="amount">Amount</option>
                  <option value="category">Category</option>
                </select>
                <button class="btn btn-secondary btn-sm" id="e-sort-dir-btn" onclick="toggleSortDir()">↓</button>
              </div>
            </div>
          </div>

          <div id="exp-count" style="font-size:11px;color:var(--muted);padding-left:2px"></div>
          <div id="exp-list" style="display:flex;flex-direction:column;gap:8px"></div>
        </div>
      </div>
    </div>

    <!-- BUDGET -->
    <div id="tab-budget" class="tab-panel">
      <div style="display:flex;flex-direction:column;gap:16px;max-width:820px">
        <div class="card" style="padding:20px">
          <div class="section-title">📊 This Month Overview</div>
          <div class="stats-grid" id="budget-stats" style="margin-bottom:16px"></div>
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:5px">
              <span style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em">Spending Rate</span>
              <span class="mono" style="font-size:12px" id="spending-rate-label"></span>
            </div>
            <div class="progress-track" style="height:9px">
              <div class="progress-fill" id="spending-rate-bar" style="background:linear-gradient(90deg,var(--orange),#e07748)"></div>
            </div>
          </div>
        </div>

        <div class="card" style="padding:20px">
          <div class="section-title">🎯 Category Budgets — <span id="budget-month-label"></span></div>
          <div id="budget-cats" style="display:flex;flex-direction:column;gap:16px"></div>
          <div id="budget-total-row" style="display:none;margin-top:16px;padding-top:12px;border-top:1.5px solid var(--border);display:flex;justify-content:space-between">
            <span style="font-size:12px;color:var(--muted)">Total budgeted</span>
            <span class="mono" style="font-size:14px;font-weight:700" id="budget-total-val"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <nav id="bottom-nav">
    <button class="bnav-btn active" id="bnav-dashboard" onclick="switchTab('dashboard')"><span class="icon">📊</span>Dashboard</button>
    <button class="bnav-btn" id="bnav-tasks" onclick="switchTab('tasks')"><span class="icon">✅</span>Tasks</button>
    <button class="bnav-btn" id="bnav-expenses" onclick="switchTab('expenses')"><span class="icon">💸</span>Expenses</button>
    <button class="bnav-btn" id="bnav-budget" onclick="switchTab('budget')"><span class="icon">🎯</span>Budget</button>
  </nav>
</div>

<div id="toast"></div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const CAT_COLORS = {work:'#2a7dd4',personal:'#2a9d5c',shopping:'#d4a02a',bills:'#d42a2a',food:'#d4622a',health:'#7a2ad4'};
const CAT_BG     = {work:'#e0eef5',personal:'#e0f5ea',shopping:'#fef3d8',bills:'#fde8e8',food:'#fdf0e0',health:'#ede0f5'};
const CAT_ICONS  = {food:'🍽️',bills:'📄',shopping:'🛍️',work:'💼',health:'💊',personal:'👤'};
const CATEGORIES = ['work','personal','shopping','bills','food','health'];

let tasks=[], expenses=[], income=[], budgets={};
let editingTaskId = null;
let editingExpId  = null;
let pendingSubtasks = [];
let selectedTasks = new Set();
let expSortDir = 'desc';
let browseMonth = todayMonth();
let viewMode = 'expenses';
let lineChart = null, pieChart = null;

function today(){ return new Date().toISOString().split('T')[0]; }
function todayMonth(){ return today().slice(0,7); }
function monthKey(d){ return d.slice(0,7); }
function monthLabel(ym){
  const [y,m]=ym.split('-');
  return new Date(+y,+m-1,1).toLocaleDateString('en-IN',{month:'short',year:'numeric'});
}
const fmt = n => '₹'+(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2});

// ── Persist ──────────────────────────────────────────────────────────────────
function save(){
  localStorage.setItem('tr_tasks',    JSON.stringify(tasks));
  localStorage.setItem('tr_expenses', JSON.stringify(expenses));
  localStorage.setItem('tr_income',   JSON.stringify(income));
  localStorage.setItem('tr_budgets',  JSON.stringify(budgets));
}
function load(){
  try{ tasks    = JSON.parse(localStorage.getItem('tr_tasks')    ||'[]'); }catch{ tasks=[];}
  try{ expenses = JSON.parse(localStorage.getItem('tr_expenses') ||'[]'); }catch{ expenses=[];}
  try{ income   = JSON.parse(localStorage.getItem('tr_income')   ||'[]'); }catch{ income=[];}
  try{ budgets  = JSON.parse(localStorage.getItem('tr_budgets')  ||'{}'); }catch{ budgets={};}
}

// ── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'),2500);
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
let currentTab = 'dashboard';
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active', p.id==='tab-'+tab));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.textContent.toLowerCase()===tab));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.toggle('active', b.id==='bnav-'+tab));
  renderTab(tab);
}
function renderTab(tab){
  if(tab==='dashboard') renderDashboard();
  if(tab==='tasks')     { populateExpenseSelect(); renderTasks(); }
  if(tab==='expenses')  { populateTaskSelect(); renderExpensesMonth(); renderExpenses(); }
  if(tab==='budget')    renderBudget();
}

// ── Dashboard ────────────────────────────────────────────────────────────────
function renderDashboard(){
  const tod = today();
  const cur = todayMonth();
  const lastM = (()=>{ const d=new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); })();

  const todayExp   = expenses.filter(e=>e.date===tod).reduce((s,e)=>s+e.amount,0);
  const curMonExp  = expenses.filter(e=>monthKey(e.date)===cur).reduce((s,e)=>s+e.amount,0);
  const lastMonExp = expenses.filter(e=>monthKey(e.date)===lastM).reduce((s,e)=>s+e.amount,0);
  const curMonInc  = income.filter(i=>monthKey(i.date)===cur).reduce((s,i)=>s+i.amount,0);
  const netSavings = curMonInc - curMonExp;
  const diff = lastMonExp>0 ? ((curMonExp-lastMonExp)/lastMonExp*100).toFixed(1) : null;
  const completedTasks = tasks.filter(t=>t.status==='completed').length;
  const overdueTasks   = tasks.filter(t=>t.status!=='completed'&&t.dueDate&&t.dueDate<tod).length;
  const todayTasks     = tasks.filter(t=>t.dueDate===tod);

  // Stats
  const statsEl = document.getElementById('dash-stats');
  statsEl.innerHTML = `
    ${statCard("Today's Spend", fmt(todayExp), 'var(--orange)', '')}
    ${statCard('This Month', fmt(curMonExp), 'var(--blue)', diff!=null?`<span style="color:${+diff>0?'var(--red)':'var(--green)'}">${+diff>0?'↑':'↓'} ${Math.abs(diff)}% vs last month</span>`:'')}
    ${statCard('Income', fmt(curMonInc), 'var(--green)', '')}
    ${statCard('Net Savings', fmt(netSavings), netSavings>=0?'var(--green)':'var(--red)', `<span>${netSavings>=0?'🎉 On track':'⚠️ Over income'}</span>`)}
    ${statCard('Tasks Done', `${completedTasks}/${tasks.length}`, 'var(--purple)', overdueTasks>0?`<span style="color:var(--red)">⚠️ ${overdueTasks} overdue</span>`:'')}
  `;

  // Line chart
  const months6 = Array.from({length:6},(_,i)=>{
    const d = new Date(new Date().getFullYear(), new Date().getMonth()-5+i, 1);
    const mk = d.toISOString().slice(0,7);
    return { name: d.toLocaleDateString('en-IN',{month:'short'}), total: expenses.filter(e=>e.date.startsWith(mk)).reduce((s,e)=>s+e.amount,0) };
  });
  if(lineChart) lineChart.destroy();
  const lCtx = document.getElementById('chart-line').getContext('2d');
  lineChart = new Chart(lCtx,{type:'line',data:{labels:months6.map(m=>m.name),datasets:[{data:months6.map(m=>m.total),borderColor:'#d4622a',backgroundColor:'rgba(212,98,42,.08)',tension:.35,pointBackgroundColor:'#d4622a',pointRadius:4,borderWidth:2.5,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}},scales:{x:{grid:{display:false},ticks:{font:{family:'DM Sans',size:11}}},y:{grid:{color:'#f0ede8'},ticks:{font:{family:'DM Mono',size:10},callback:v=>'₹'+v.toLocaleString('en-IN')}}}}});

  // Pie chart
  const catData = CATEGORIES.map(c=>({name:c.charAt(0).toUpperCase()+c.slice(1), value:expenses.filter(e=>monthKey(e.date)===cur&&e.category===c).reduce((s,e)=>s+e.amount,0), color:CAT_COLORS[c]})).filter(x=>x.value>0);
  if(pieChart) pieChart.destroy();
  document.getElementById('pie-empty').style.display = catData.length===0?'block':'none';
  const pCtx = document.getElementById('chart-pie').getContext('2d');
  if(catData.length>0){
    document.getElementById('chart-pie').style.display='block';
    pieChart = new Chart(pCtx,{type:'doughnut',data:{labels:catData.map(c=>c.name),datasets:[{data:catData.map(c=>c.value),backgroundColor:catData.map(c=>c.color),borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'DM Sans',size:11},boxWidth:9,usePointStyle:true}},tooltip:{callbacks:{label:ctx=>' '+fmt(ctx.raw)}}}}});
  } else {
    document.getElementById('chart-pie').style.display='none';
  }

  // Today's tasks
  const todayEl = document.getElementById('dash-today-tasks');
  if(todayTasks.length===0){ todayEl.innerHTML='<p class="empty-state">No tasks due today ✓</p>'; return; }
  todayEl.innerHTML = todayTasks.map(t=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-radius:8px;background:var(--input-bg);margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:9px">
        <span style="font-size:13px;font-weight:600;color:${t.status==='completed'?'var(--muted)':'var(--text)'};text-decoration:${t.status==='completed'?'line-through':'none'}">${esc(t.title)}</span>
        <span class="tag tag-${t.priority}">${t.priority}</span>
      </div>
      <span class="tag tag-blue">${t.status}</span>
    </div>`).join('');
}

function statCard(label,value,accent,sub){
  return `<div class="stat-card" style="border-top-color:${accent}"><div class="stat-label">${label}</div><div class="stat-value mono">${value}</div>${sub?`<div class="stat-sub">${sub}</div>`:''}</div>`;
}

// ── Tasks ────────────────────────────────────────────────────────────────────
function populateExpenseSelect(){
  const sel = document.getElementById('t-linked-expense');
  const cur = sel.value;
  sel.innerHTML = '<option value="">None</option>'+expenses.map(e=>`<option value="${e.id}">${fmt(e.amount)} – ${esc(e.note||e.category)} (${e.date})</option>`).join('');
  sel.value = cur;
}

function submitTask(){
  const title = document.getElementById('t-title').value.trim();
  if(!title){ showToast('Title is required'); return; }
  const task = {
    title,
    priority: document.getElementById('t-priority').value,
    category: document.getElementById('t-category').value,
    dueDate:  document.getElementById('t-duedate').value,
    status:   editingTaskId ? (tasks.find(t=>t.id===editingTaskId)||{}).status||'pending' : 'pending',
    subtasks: [...pendingSubtasks],
    linkedExpenseId: document.getElementById('t-linked-expense').value || null,
  };
  if(editingTaskId){
    const idx = tasks.findIndex(t=>t.id===editingTaskId);
    tasks[idx] = {...tasks[idx],...task};
    showToast('Task updated ✓');
  } else {
    tasks.push({...task, id:Date.now().toString(), createdAt:Date.now()});
    showToast('Task added ✓');
  }
  save(); cancelTaskEdit(); renderTasks();
}

function cancelTaskEdit(){
  editingTaskId=null; pendingSubtasks=[];
  document.getElementById('t-title').value='';
  document.getElementById('t-priority').value='medium';
  document.getElementById('t-category').value='personal';
  document.getElementById('t-duedate').value='';
  document.getElementById('t-linked-expense').value='';
  document.getElementById('t-subtask-input').value='';
  document.getElementById('t-submit-btn').textContent='Add Task';
  document.getElementById('t-cancel-btn').style.display='none';
  document.getElementById('task-form-title').textContent='➕ New Task';
  renderSubtaskList();
}

function editTask(id){
  const t = tasks.find(x=>x.id===id); if(!t) return;
  editingTaskId = id; pendingSubtasks = [...(t.subtasks||[])];
  document.getElementById('t-title').value = t.title;
  document.getElementById('t-priority').value = t.priority;
  document.getElementById('t-category').value = t.category;
  document.getElementById('t-duedate').value = t.dueDate||'';
  document.getElementById('t-linked-expense').value = t.linkedExpenseId||'';
  document.getElementById('t-submit-btn').textContent='Update Task';
  document.getElementById('t-cancel-btn').style.display='';
  document.getElementById('task-form-title').textContent='✏️ Edit Task';
  renderSubtaskList();
  // scroll to form on mobile
  document.querySelector('.left-panel').scrollIntoView({behavior:'smooth',block:'start'});
}

function addSubtask(){
  const inp = document.getElementById('t-subtask-input');
  const v = inp.value.trim(); if(!v) return;
  pendingSubtasks.push({text:v,done:false});
  inp.value=''; renderSubtaskList();
}
function removeSubtask(i){ pendingSubtasks.splice(i,1); renderSubtaskList(); }
function renderSubtaskList(){
  document.getElementById('subtask-count').textContent = pendingSubtasks.length;
  document.getElementById('subtask-list').innerHTML = pendingSubtasks.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:5px 7px;border-radius:6px;font-size:13px;color:var(--muted)">
      <span style="flex:1">• ${esc(s.text)}</span>
      <button type="button" onclick="removeSubtask(${i})" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:16px;line-height:1;padding:0">×</button>
    </div>`).join('');
}

function toggleTask(id){
  const t = tasks.find(x=>x.id===id); if(!t) return;
  t.status = t.status==='completed'?'pending':'completed';
  save(); renderTasks();
}
function toggleSubtask(tid,idx){
  const t = tasks.find(x=>x.id===tid); if(!t) return;
  t.subtasks[idx].done = !t.subtasks[idx].done;
  save(); renderTasks();
}
function deleteTask(id){ tasks=tasks.filter(t=>t.id!==id); save(); renderTasks(); showToast('Task deleted'); }

let selectedIds = new Set();
function toggleSelect(id){ if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id); renderTasks(); }
function clearSelection(){ selectedIds.clear(); renderTasks(); }
function selectAll(){
  const filtered = getFilteredTasks();
  filtered.forEach(t=>selectedIds.add(t.id)); renderTasks();
}
function bulkComplete(){
  tasks.forEach(t=>{ if(selectedIds.has(t.id)) t.status='completed'; });
  showToast(`${selectedIds.size} tasks completed`); selectedIds.clear(); save(); renderTasks();
}
function bulkDelete(){
  const n = selectedIds.size;
  tasks = tasks.filter(t=>!selectedIds.has(t.id));
  showToast(`${n} tasks deleted`); selectedIds.clear(); save(); renderTasks();
}

function getFilteredTasks(){
  const search = document.getElementById('t-search').value.toLowerCase();
  const fp = document.getElementById('t-filter-priority').value;
  const fs = document.getElementById('t-filter-status').value;
  const sort = document.getElementById('t-sort').value;
  const tod = today();
  let filtered = tasks.filter(t=>{
    if(search && !t.title.toLowerCase().includes(search)) return false;
    if(fp!=='all' && t.priority!==fp) return false;
    if(fs==='overdue') return t.status!=='completed'&&t.dueDate&&t.dueDate<tod;
    if(fs!=='all' && t.status!==fs) return false;
    return true;
  });
  filtered = [...filtered].sort((a,b)=>{
    if(sort==='dueDate') return (a.dueDate||'9999')>(b.dueDate||'9999')?1:-1;
    if(sort==='priority') return ({high:0,medium:1,low:2}[a.priority]||0)-({high:0,medium:1,low:2}[b.priority]||0);
    if(sort==='title') return a.title.localeCompare(b.title);
    return (b.createdAt||0)-(a.createdAt||0);
  });
  return filtered;
}

function renderTasks(){
  const filtered = getFilteredTasks();
  const tod = today();
  document.getElementById('task-count').textContent = `${filtered.length} task${filtered.length!==1?'s':''}`;

  // Bulk bar
  const bb = document.getElementById('bulk-bar');
  if(selectedIds.size>0){
    bb.style.display='flex';
    document.getElementById('bulk-count').textContent=`${selectedIds.size} selected`;
  } else {
    bb.style.display='none';
  }

  if(filtered.length===0){ document.getElementById('task-list').innerHTML='<div class="empty-state">No tasks found.</div>'; return; }

  document.getElementById('task-list').innerHTML = filtered.map(task=>{
    const isOverdue = task.status!=='completed'&&task.dueDate&&task.dueDate<tod;
    const linkedExp = expenses.find(e=>e.id===task.linkedExpenseId);
    const subs = task.subtasks||[];
    const sDone = subs.filter(s=>s.done).length;
    const progress = subs.length>0?(sDone/subs.length)*100:0;
    const isSel = selectedIds.has(task.id);
    const subsHtml = subs.length>0 ? `
      <div style="margin:5px 0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
          <div class="progress-track" style="flex:1"><div class="progress-fill" style="width:${progress}%;background:${progress===100?'var(--green)':'var(--blue)'}"></div></div>
          <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap">${sDone}/${subs.length}</span>
        </div>
        ${subs.map((s,i)=>`
        <div onclick="toggleSubtask('${task.id}',${i})" style="display:flex;align-items:center;gap:7px;padding:4px 7px;border-radius:6px;cursor:pointer">
          <div class="checkbox checkbox-sm ${s.done?'checked':''}" style="${s.done?'border-color:var(--green);background:var(--green)':''}">
            ${s.done?'<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}
          </div>
          <span style="font-size:12px;color:${s.done?'var(--muted)':'var(--text)'};text-decoration:${s.done?'line-through':'none'}">${esc(s.text)}</span>
        </div>`).join('')}
      </div>` : '';
    return `
    <div class="task-card ${task.status==='completed'?'done':''} ${isOverdue?'overdue':''} ${isSel?'selected':''}" style="${isSel?'outline:2px solid var(--orange)':''}">
      <div style="display:flex;align-items:flex-start;gap:9px">
        <div class="checkbox ${isSel?'checked':''}" onclick="toggleSelect('${task.id}')" style="${isSel?'border-color:var(--orange);background:var(--orange)':''}">
          ${isSel?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}
        </div>
        <div class="checkbox ${task.status==='completed'?'checked':''}" onclick="toggleTask('${task.id}')" style="${task.status==='completed'?'border-color:var(--green);background:var(--green)':''}">
          ${task.status==='completed'?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>':''}
        </div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:5px">
            <span style="font-size:13px;font-weight:600;color:${task.status==='completed'?'var(--muted)':'var(--text)'};text-decoration:${task.status==='completed'?'line-through':'none'}">${esc(task.title)}</span>
            <span class="tag tag-${task.priority}">${task.priority}</span>
            <span class="tag" style="background:${CAT_BG[task.category]};color:${CAT_COLORS[task.category]}">${task.category}</span>
            ${task.dueDate?`<span class="tag ${isOverdue?'tag-high':'tag-purple'}">📅 ${task.dueDate}${isOverdue?' OVERDUE':''}</span>`:''}
            ${linkedExp?`<span class="tag tag-orange">💰 ${fmt(linkedExp.amount)}</span>`:''}
          </div>
          ${subsHtml}
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          <button class="btn btn-secondary btn-sm" onclick="editTask('${task.id}')">✏️</button>
          <button class="btn btn-danger btn-sm" onclick="deleteTask('${task.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Expenses ──────────────────────────────────────────────────────────────────
function populateTaskSelect(){
  const sel = document.getElementById('e-linked-task');
  const cur = sel.value;
  sel.innerHTML = '<option value="">None</option>'+tasks.map(t=>`<option value="${t.id}">${esc(t.title)}</option>`).join('');
  sel.value = cur;
}

function submitExpense(){
  const amount = parseFloat(document.getElementById('e-amount').value);
  if(!amount||amount<=0){ showToast('Enter a valid amount'); return; }
  const exp = {
    amount,
    note:     document.getElementById('e-note').value.trim(),
    category: document.getElementById('e-category').value,
    date:     document.getElementById('e-date').value || today(),
    linkedTaskId: document.getElementById('e-linked-task').value || null,
  };
  if(editingExpId){
    const idx = expenses.findIndex(e=>e.id===editingExpId);
    expenses[idx] = {...expenses[idx],...exp};
    showToast('Expense updated ✓');
  } else {
    expenses.push({...exp, id:Date.now().toString()});
    showToast('Expense added ✓');
  }
  save(); cancelExpEdit(); renderExpensesMonth(); renderExpenses();
}

function cancelExpEdit(){
  editingExpId=null;
  document.getElementById('e-amount').value='';
  document.getElementById('e-note').value='';
  document.getElementById('e-category').value='personal';
  document.getElementById('e-date').value=today();
  document.getElementById('e-linked-task').value='';
  document.getElementById('e-submit-btn').textContent='Add Expense';
  document.getElementById('e-cancel-btn').style.display='none';
  document.getElementById('exp-form-title').textContent='💸 Add Expense';
}

function editExp(id){
  const e = expenses.find(x=>x.id===id); if(!e) return;
  editingExpId=id;
  document.getElementById('e-amount').value=e.amount;
  document.getElementById('e-note').value=e.note||'';
  document.getElementById('e-category').value=e.category;
  document.getElementById('e-date').value=e.date;
  document.getElementById('e-linked-task').value=e.linkedTaskId||'';
  document.getElementById('e-submit-btn').textContent='Update';
  document.getElementById('e-cancel-btn').style.display='';
  document.getElementById('exp-form-title').textContent='✏️ Edit Expense';
  document.querySelector('.left-panel').scrollIntoView({behavior:'smooth',block:'start'});
}

function deleteExp(id){ expenses=expenses.filter(e=>e.id!==id); save(); renderExpensesMonth(); renderExpenses(); showToast('Deleted'); }

function submitIncome(){
  const amount = parseFloat(document.getElementById('i-amount').value);
  if(!amount||amount<=0){ showToast('Enter a valid amount'); return; }
  income.push({
    amount,
    source: document.getElementById('i-source').value,
    date:   document.getElementById('i-date').value || today(),
    note:   document.getElementById('i-note').value.trim(),
    id: Date.now().toString(),
  });
  document.getElementById('i-amount').value='';
  document.getElementById('i-note').value='';
  save(); renderExpensesMonth(); renderExpenses(); showToast('Income added ✓');
}

function deleteInc(id){ income=income.filter(i=>i.id!==id); save(); renderExpensesMonth(); renderExpenses(); showToast('Deleted'); }

function prevMonth(){
  const [y,m]=browseMonth.split('-').map(Number);
  browseMonth = new Date(y,m-2,1).toISOString().slice(0,7);
  renderExpensesMonth(); renderExpenses();
}
function nextMonth(){
  const [y,m]=browseMonth.split('-').map(Number);
  const next = new Date(y,m,1).toISOString().slice(0,7);
  if(next>todayMonth()) return;
  browseMonth=next; renderExpensesMonth(); renderExpenses();
}
function setViewMode(mode){
  viewMode=mode;
  document.getElementById('vbtn-expenses').classList.toggle('active',mode==='expenses');
  document.getElementById('vbtn-income').classList.toggle('active',mode==='income');
  document.getElementById('exp-filters').style.display=mode==='expenses'?'contents':'none';
  renderExpenses();
}
function toggleSortDir(){
  expSortDir = expSortDir==='asc'?'desc':'asc';
  document.getElementById('e-sort-dir-btn').textContent=expSortDir==='asc'?'↑':'↓';
  renderExpenses();
}

function renderExpensesMonth(){
  document.getElementById('exp-month-label').textContent = monthLabel(browseMonth);
  document.getElementById('next-month-btn').disabled = browseMonth>=todayMonth();

  const monthExp = expenses.filter(e=>monthKey(e.date)===browseMonth);
  const monthInc = income.filter(i=>monthKey(i.date)===browseMonth);
  const mTotal   = monthExp.reduce((s,e)=>s+e.amount,0);
  const mInc     = monthInc.reduce((s,i)=>s+i.amount,0);
  const mNet     = mInc-mTotal;

  document.getElementById('exp-month-totals').innerHTML = [['Expenses',mTotal,'var(--orange)'],['Income',mInc,'var(--green)'],['Net',mNet,mNet>=0?'var(--green)':'var(--red)']].map(([l,v,c])=>`
    <div style="text-align:right">
      <div style="font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em">${l}</div>
      <div class="mono" style="font-size:15px;font-weight:700;color:${c}">${fmt(v)}</div>
    </div>`).join('');

  const catTotals = CATEGORIES.map(c=>({c,v:monthExp.filter(e=>e.category===c).reduce((s,e)=>s+e.amount,0)})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  document.getElementById('cat-bars').innerHTML = catTotals.map(({c,v})=>`
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:5px">
      <span style="width:65px;font-size:11px;font-weight:700;color:var(--muted);text-transform:capitalize">${c}</span>
      <div class="progress-track" style="flex:1"><div class="progress-fill" style="width:${Math.min((v/mTotal)*100,100)}%;background:${CAT_COLORS[c]}"></div></div>
      <span style="width:75px;text-align:right;font-size:11px;font-family:'DM Mono',monospace">${fmt(v)}</span>
    </div>`).join('');
}

function renderExpenses(){
  const listEl = document.getElementById('exp-list');
  const monthExp = expenses.filter(e=>monthKey(e.date)===browseMonth);
  const monthInc = income.filter(i=>monthKey(i.date)===browseMonth);

  if(viewMode==='income'){
    document.getElementById('exp-count').textContent='';
    if(monthInc.length===0){ listEl.innerHTML='<div class="empty-state">No income recorded for this period.</div>'; return; }
    listEl.innerHTML = monthInc.map(inc=>`
      <div class="exp-card">
        <div style="display:flex;align-items:center;gap:11px">
          <div class="exp-icon" style="background:#e0f5ea">💵</div>
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap">
              <span style="font-size:13px;font-weight:600">${esc(inc.note||inc.source)}</span>
              <span class="tag tag-gray">${inc.source}</span>
            </div>
            <span style="font-size:11px;color:var(--muted)">${inc.date}</span>
          </div>
          <div class="mono" style="font-size:16px;font-weight:700;color:var(--green)">${fmt(inc.amount)}</div>
          <button class="btn btn-danger btn-sm" onclick="deleteInc('${inc.id}')">🗑</button>
        </div>
      </div>`).join('');
    return;
  }

  const search = document.getElementById('e-search').value.toLowerCase();
  const fc = document.getElementById('e-filter-cat').value;
  const sortBy = document.getElementById('e-sort').value;
  let filtered = monthExp.filter(e=>{
    if(fc!=='all'&&e.category!==fc) return false;
    if(search&&!(e.note||'').toLowerCase().includes(search)&&!e.category.includes(search)) return false;
    return true;
  });
  filtered = [...filtered].sort((a,b)=>{
    const dir = expSortDir==='asc'?1:-1;
    if(sortBy==='amount') return dir*(a.amount-b.amount);
    if(sortBy==='category') return dir*a.category.localeCompare(b.category);
    return dir*(a.date>b.date?1:-1);
  });
  document.getElementById('exp-count').textContent=`${filtered.length} expense${filtered.length!==1?'s':''} · ${fmt(filtered.reduce((s,e)=>s+e.amount,0))}`;
  if(filtered.length===0){ listEl.innerHTML='<div class="empty-state">No expenses for this period.</div>'; return; }

  listEl.innerHTML = filtered.map(exp=>{
    const lt = tasks.find(t=>t.id===exp.linkedTaskId);
    return `
    <div class="exp-card">
      <div style="display:flex;align-items:center;gap:11px">
        <div class="exp-icon" style="background:${CAT_BG[exp.category]}">${CAT_ICONS[exp.category]}</div>
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap">
            <span style="font-size:13px;font-weight:600">${esc(exp.note||'Expense')}</span>
            <span class="tag" style="background:${CAT_BG[exp.category]};color:${CAT_COLORS[exp.category]}">${exp.category}</span>
            ${lt?`<span class="tag tag-blue">📋 ${esc(lt.title)}</span>`:''}
          </div>
          <span style="font-size:11px;color:var(--muted)">${exp.date}</span>
        </div>
        <div class="mono" style="font-size:16px;font-weight:700;color:var(--orange)">${fmt(exp.amount)}</div>
        <button class="btn btn-secondary btn-sm" onclick="editExp('${exp.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteExp('${exp.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ── Budget ────────────────────────────────────────────────────────────────────
function renderBudget(){
  const cur = todayMonth();
  const curInc = income.filter(i=>monthKey(i.date)===cur).reduce((s,i)=>s+i.amount,0);
  const curExp = expenses.filter(e=>monthKey(e.date)===cur).reduce((s,e)=>s+e.amount,0);

  document.getElementById('budget-month-label').textContent = monthLabel(cur);

  document.getElementById('budget-stats').innerHTML = `
    ${statCard('Total Income', fmt(curInc), 'var(--green)','')}
    ${statCard('Total Expenses', fmt(curExp), 'var(--orange)','')}
    ${statCard('Net Savings', fmt(curInc-curExp), curInc-curExp>=0?'var(--green)':'var(--red)','')}
  `;

  const pct = curInc>0?Math.min((curExp/curInc)*100,100):0;
  document.getElementById('spending-rate-label').textContent = `${curInc>0?((curExp/curInc)*100).toFixed(1):0}% of income`;
  document.getElementById('spending-rate-bar').style.width = pct+'%';

  const totalBudget = Object.values(budgets).reduce((s,v)=>s+(+v||0),0);
  const totalEl = document.getElementById('budget-total-row');
  if(totalBudget>0){
    totalEl.style.display='flex';
    document.getElementById('budget-total-val').textContent=fmt(totalBudget);
  } else { totalEl.style.display='none'; }

  document.getElementById('budget-cats').innerHTML = CATEGORIES.map(cat=>{
    const spent = expenses.filter(e=>monthKey(e.date)===cur&&e.category===cat).reduce((s,e)=>s+e.amount,0);
    const budget = +budgets[cat]||0;
    const pct = budget>0?Math.min((spent/budget)*100,100):0;
    const over = budget>0&&spent>budget;
    return `
    <div>
      <div style="display:flex;align-items:center;gap:11px;margin-bottom:7px">
        <div style="width:10px;height:10px;border-radius:50%;background:${CAT_COLORS[cat]};flex-shrink:0"></div>
        <span style="font-size:13px;font-weight:700;text-transform:capitalize;flex:1">${cat}</span>
        <span class="mono" style="font-size:12px;color:${over?'var(--red)':'var(--text)'}">${fmt(spent)}</span>
        <span style="font-size:11px;color:var(--muted)">of</span>
        <span class="mono" style="font-size:12px;font-weight:600">${budget>0?fmt(budget):'—'}</span>
        ${over?'<span class="tag tag-high">Over!</span>':''}
      </div>
      <div class="progress-track" style="margin-bottom:7px"><div class="progress-fill" style="width:${pct}%;background:${over?'var(--red)':CAT_COLORS[cat]}"></div></div>
      <div style="display:flex;gap:6px">
        <input type="number" min="0" placeholder="Set budget for ${cat}…" id="budget-input-${cat}" value="${budget||''}" style="flex:1;font-size:12px;padding:6px 11px" onkeydown="if(event.key==='Enter') saveBudget('${cat}')"/>
        <button class="btn btn-primary btn-sm" onclick="saveBudget('${cat}')">Set</button>
        ${budget>0?`<button class="btn btn-danger btn-sm" onclick="clearBudget('${cat}')">Clear</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function saveBudget(cat){
  const v = parseFloat(document.getElementById('budget-input-'+cat).value);
  if(!v||v<=0){ showToast('Enter a valid budget amount'); return; }
  budgets[cat]=v; save(); renderBudget(); showToast(`Budget set for ${cat} ✓`);
}
function clearBudget(cat){
  delete budgets[cat]; save(); renderBudget(); showToast('Budget cleared');
}

// ── Utils ────────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  load();

  // Set default dates
  const t = today();
  document.getElementById('e-date').value = t;
  document.getElementById('i-date').value = t;

  browseMonth = todayMonth();

  // Hide loading, show app
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';

  renderDashboard();
});
</script>
